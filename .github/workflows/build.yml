---
name: Build container image
on:
  pull_request:
    branches:
      - main
  schedule:
    - cron: '05 10 * * *'  # 10:05am UTC everyday
  push:
    branches:
      - main
    paths-ignore:
      - '**/README.md'
  workflow_dispatch:
    inputs:
      image:
        description: "Image to build"
        required: true
        default: all
        type: choice
        options:
          - all
          - kokinos
          - kokinos-nvidia
          - kokinos-mac

env:
  IMAGE_REGISTRY: "ghcr.io/${{ github.repository_owner }}"  # do not edit

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  build_push:
    name: Build and push ${{ matrix.image.name }}
    runs-on: ${{ matrix.image.runner }}
    strategy:
      fail-fast: false
      matrix:
        image:
          - name: kokinos
            base: ghcr.io/ublue-os/bazzite:stable
            runner: ubuntu-24.04
          - name: kokinos-nvidia
            base: ghcr.io/ublue-os/bazzite-nvidia-open:stable
            runner: ubuntu-24.04
          - name: kokinos-mac
            base: quay.io/fedora/fedora-kinoite:42
            runner: ubuntu-24.04-arm

    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Matrix filter
        id: matrix-filter
        shell: bash
        run: |
          selected_image="${{ inputs.image || 'all' }}"
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${selected_image}" != "all" && "${selected_image}" != "${{ matrix.image.name }}" ]]; then
            echo "should_build=false" >> "${GITHUB_OUTPUT}"
          else
            echo "should_build=true" >> "${GITHUB_OUTPUT}"
          fi

      # These stage versions are pinned by https://github.com/renovatebot/renovate
      - name: Checkout
        if: steps.matrix-filter.outputs.should_build == 'true'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Maximize build space
        if: steps.matrix-filter.outputs.should_build == 'true' && matrix.image.runner != 'ubuntu-24.04-arm'
        uses: ublue-os/remove-unwanted-software@695eb75bc387dbcd9685a8e72d23439d8686cba6

      - name: Install just
        if: steps.matrix-filter.outputs.should_build == 'true'
        uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 #v4.0.0

      - name: Check Just Syntax
        if: steps.matrix-filter.outputs.should_build == 'true'
        shell: bash
        run: |
          just check

      - name: Image Name
        if: steps.matrix-filter.outputs.should_build == 'true'
        id: image-name
        run: |
          echo "IMAGE_NAME=${{ matrix.image.name }}" >> $GITHUB_ENV
          echo "BASE_IMAGE=${{ matrix.image.base }}" >> $GITHUB_ENV

      - name: Default Tag
        if: steps.matrix-filter.outputs.should_build == 'true'
        id: gen-default-tag
        run: |
          DEFAULT_TAG=$(just generate-default-tag)

          echo "DEFAULT_TAG=${DEFAULT_TAG}" >> $GITHUB_ENV

      - name: Prepare environment
        if: steps.matrix-filter.outputs.should_build == 'true'
        run: |
          # Lowercase the image uri https://github.com/macbre/push-to-ghcr/issues/12
          echo "IMAGE_REGISTRY=${IMAGE_REGISTRY,,}" >> ${GITHUB_ENV}
          echo "IMAGE_NAME=${IMAGE_NAME,,}" >> ${GITHUB_ENV}

      # This actually builds the container image
      - name: Build Image
        if: steps.matrix-filter.outputs.should_build == 'true'
        id: build-image
        run: |
          sudo -E $(command -v just) build \
            ${IMAGE_NAME} \
            ${DEFAULT_TAG} \
            ${BASE_IMAGE}

      # Rechunking can provide smaller delta updates, but it is intentionally
      # disabled for v1 while the base images and branding layer stabilize.
      # Re-enable one of these options once the regular build/publish path is green.
      #
      # - name: Rechunk with rpm-ostree
      #   id: rechunk
      #   run: |
      #     sudo -E $(command -v just) ostree-rechunk \
      #       ${IMAGE_NAME} \
      #       ${DEFAULT_TAG}
      #
      # https://github.com/coreos/chunkah
      # - name: Rechunk with Chunkah
      #   id: rechunk
      #   run: |
      #     sudo -E $(command -v just) rechunk \
      #       ${IMAGE_NAME} \
      #       ${DEFAULT_TAG}

      - name: Generate Build Tags
        if: steps.matrix-filter.outputs.should_build == 'true'
        id: gen-build-tags
        run: |
          alias_tags="$(just generate-build-tags \
                        ${IMAGE_NAME} \
                        ${DEFAULT_TAG})"

          echo "Tags for this Action..."
          echo "${alias_tags}"
          echo "alias_tags=${alias_tags}" >> $GITHUB_OUTPUT

      - name: Tag Image
        if: steps.matrix-filter.outputs.should_build == 'true'
        id: tag-images
        env:
          ALIAS_TAGS: ${{ steps.gen-build-tags.outputs.alias_tags }}
        run: |
          sudo -E $(command -v just) tag-images \
            "${IMAGE_NAME}" \
            "${DEFAULT_TAG}" \
            "${ALIAS_TAGS}"

      # These `if` statements are so that pull requests for your custom images do not make it publish any packages under your name without you knowing
      # They also check if the runner is on the default branch so that things like the merge queue (if you enable it), are going to work
      - name: Login to GitHub Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        if: steps.matrix-filter.outputs.should_build == 'true' && github.event_name != 'pull_request' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push To GHCR
        if: steps.matrix-filter.outputs.should_build == 'true' && github.event_name != 'pull_request' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
        id: push-image
        env:
          ALIAS_TAGS: ${{ steps.gen-build-tags.outputs.alias_tags }}
        run: |
          set -euox pipefail
          for tag in ${ALIAS_TAGS}; do
            sudo -E podman push --digestfile=/tmp/digestfile ${IMAGE_NAME}:${tag} ${IMAGE_REGISTRY}/${IMAGE_NAME}:${tag}
          done

          digest=$(< /tmp/digestfile)

          echo "digest=${digest}" >> $GITHUB_OUTPUT

      - name: Install image inspection tools
        if: steps.matrix-filter.outputs.should_build == 'true' && github.event_name != 'pull_request' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
        run: |
          sudo apt-get update
          sudo apt-get install -y jq skopeo

      - name: Verify image rootfs metadata
        if: steps.matrix-filter.outputs.should_build == 'true' && github.event_name != 'pull_request' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
        env:
          GHCR_CREDS: ${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}
          DIGEST: ${{ steps.push-image.outputs.digest }}
        run: |
          set -euo pipefail

          image_ref="${IMAGE_REGISTRY}/${IMAGE_NAME}@${DIGEST}"
          layers=$(skopeo inspect --creds "${GHCR_CREDS}" --raw "docker://${image_ref}" | jq '.layers | length')
          diff_ids=$(skopeo inspect --creds "${GHCR_CREDS}" --config "docker://${image_ref}" | jq '.rootfs.diff_ids | length')

          echo "manifest layers=${layers}"
          echo "rootfs diff_ids=${diff_ids}"

          if [[ "${layers}" -ne "${diff_ids}" ]]; then
            echo "Image rootfs metadata does not match manifest layers." >&2
            exit 1
          fi

      # This section is optional and only needs to be enabled if you plan on distributing
      # your project for others to consume. You will need to create a public and private key
      # using Cosign and save the private key as a repository secret in Github for this workflow
      # to consume. For more details, review the image signing section of the README.
      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        if: steps.matrix-filter.outputs.should_build == 'true' && github.event_name != 'pull_request' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
        # https://github.com/containers/container-libs/issues/388
        with:
          cosign-release: 'v2.6.3'

      - name: Sign container image
        id: sign-image
        if: steps.matrix-filter.outputs.should_build == 'true' && github.event_name != 'pull_request' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
        env:
          COSIGN_EXPERIMENTAL: false
          COSIGN_PASSWORD: ""
          COSIGN_PRIVATE_KEY: ${{ secrets.SIGNING_SECRET }}
          DIGEST: ${{ steps.push-image.outputs.digest }}
        run: |
          cosign sign -y --key env://COSIGN_PRIVATE_KEY ${IMAGE_REGISTRY}/${IMAGE_NAME}@${DIGEST}
